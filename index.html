<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Rectangle Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <p class="eyebrow">Local CSV comparer</p>
        <h1>Rows, neatly boxed.</h1>
        <p class="intro">Load two CSV files side by side. Each file has its own fields, filters, and sorting.</p>
      </header>

      <section id="relationship-controls" class="relationship-controls" hidden aria-labelledby="relationship-heading">
        <div>
          <p class="eyebrow">Relationship</p>
          <h2 id="relationship-heading">Match rows by field</h2>
          <p class="relationship-hint">Choose the columns whose values identify the same item in each CSV.</p>
        </div>
        <div class="relationship-selectors">
          <label>
            CSV A field
            <select id="left-match-field"></select>
          </label>
          <span class="relationship-equals" aria-hidden="true">=</span>
          <label>
            CSV B field
            <select id="right-match-field"></select>
          </label>
        </div>
      </section>

      <div id="viewers" class="viewers"></div>
    </main>

    <template id="viewer-template">
      <section class="viewer" aria-label="CSV viewer">
        <header class="viewer-header">
          <h2 class="viewer-title"></h2>
          <label class="file-picker">
            <span>Choose a .csv file</span>
            <input class="csv-file" type="file" accept=".csv,text/csv" />
          </label>
        </header>
        <p class="status" aria-live="polite">No file selected.</p>

        <section class="field-controls" hidden>
          <div class="field-controls__heading">
            <h3>Fields to display</h3>
            <div class="field-actions">
              <button class="select-all" type="button">Select all</button>
              <button class="clear-all" type="button">Clear all</button>
            </div>
          </div>
          <div class="field-list"></div>
        </section>

        <section class="data-controls" hidden aria-label="Filter and sort rows">
          <label>
            Filter field
            <select class="filter-field"></select>
          </label>
          <label class="filter-search">
            Contains
            <input class="filter-value" type="search" placeholder="Type to filter…" />
          </label>
          <button class="clear-filter secondary-button" type="button">Clear filter</button>
          <label>
            Sort by
            <select class="sort-field"></select>
          </label>
          <label>
            Direction
            <select class="sort-direction">
              <option value="asc">A–Z / low–high</option>
              <option value="desc">Z–A / high–low</option>
            </select>
          </label>
        </section>

        <section class="card-list" aria-label="CSV rows"></section>
      </section>
    </template>
    <script src="app.js"></script>
  </body>
</html>
